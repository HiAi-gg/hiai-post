services:
  hiai-post-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hiai-post-api
    ports:
      - "50300:3000"
    env_file: .env
    environment:
      API_PORT: "3000"
      DATABASE_URL: postgresql://${POSTGRES_USER:-hipost}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/hiai_post
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - hiai-post
      - docker_ai-internal

  hiai-post-frontend:
    # For OSS users: @hiai/ui is installed from npm
    # ("npm:@hiai-gg/hiai-ui"), so the additional_contexts below is not
    # needed. The HOST_PACKAGES_DIR override is only used by internal
    # monorepo dev setups that build @hiai/ui from a sibling packages/
    # directory; leave it unset for a standalone install.
    build:
      context: .
      dockerfile: app/Dockerfile
      additional_contexts:
        - packages_host=${HOST_PACKAGES_DIR:-}
    container_name: hiai-post-frontend
    ports:
      - "50301:3000"
    env_file: .env
    environment:
      ORIGIN: ${FRONTEND_URL:-http://localhost:50301}
      API_URL: http://hiai-post-api:3000
    depends_on:
      hiai-post-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:3000/ || exit 0"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
    networks:
      - hiai-post
      - docker_ai-internal

  postgres:
    image: pgvector/pgvector:pg18
    container_name: hiai-post-pg
    environment:
      POSTGRES_DB: hiai_post
      POSTGRES_USER: ${POSTGRES_USER:-hipost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5436:5432"
    volumes:
      - hiai-post-pg:/var/lib/postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hipost} -d hiai_post"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M
    networks:
      - hiai-post
      - docker_ai-internal

  redis:
    image: redis:8.6-alpine
    container_name: hiai-post-redis
    ports:
      - "6383:6379"
    volumes:
      - hiai-post-redis:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
        reservations:
          cpus: "0.1"
          memory: 64M
    networks:
      - hiai-post
      - docker_ai-internal

volumes:
  hiai-post-pg:
  hiai-post-redis:

networks:
  hiai-post:
    driver: bridge
  docker_ai-internal:
    external: true
