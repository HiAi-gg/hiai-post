name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Biome lint (root + workspaces)
        run: bun run lint
      # `bun run lint` resolves to `bun run --filter '*' lint` which executes
      # `biome check src/` per workspace (backend + app). No ESLint, no
      # Prettier — Biome 2.5 is the single source of truth for lint+format.
      - name: Biome format check (CI mode, no writes)
        run: bunx @biomejs/biome ci .

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Typecheck backend
        run: cd backend && bunx tsc --noEmit
      - name: Typecheck frontend
        run: cd app && bunx svelte-kit sync && bunx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      # Vitest is the test runner (F2 from Phase 11). `bun test` is no longer
      # used — `vitest run` is the single entry point, with coverage uploaded
      # as an artifact on every run (including failures).
      - name: Vitest (backend)
        run: cd backend && bunx vitest run --coverage
      - name: Vitest (frontend, if tests exist)
        run: cd app && bunx vitest run --coverage || echo "no frontend tests yet"
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            **/coverage/**
            **/test-results/**

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Build backend
        run: cd backend && bun run build
      - name: Build frontend
        run: cd app && bun run build
      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: backend/dist/
      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: app/build/

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
      - run: bun install
      - name: Check for vulnerable dependencies
        run: bunx --yes npm-audit-helper 2>/dev/null || true
      - name: Audit npm packages
        run: bun audit 2>/dev/null || true
